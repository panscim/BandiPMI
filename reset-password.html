<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reimposta Password | BandiPMI</title>
    <link rel="icon" type="image/png" href="logo-formazione.png">
    <link rel="apple-touch-icon" href="logo-formazione.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --p: #1a6ef5;
            --pd: #0f4ec2;
            --g: #f4f6fa;
            --t: #1e1e2e;
            --m: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #eef2fb; 
            color: var(--t);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .cb{position:fixed;bottom:24px;left:24px;right:24px;background:#fff;padding:24px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.15);z-index:3000;display:none;align-items:center;justify-content:space-between;gap:20px;max-width:900px;margin:16px auto;border:1px solid #eef2fb;}
        .cb p{font-size:14px;color:var(--m);line-height:1.5;margin:0;}
        .cb-btns{display:flex;gap:12px;flex-shrink:0;}
        .btn-c{background:var(--p);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
        .btn-c.sec{background:#f3f4f6;color:var(--t);}
        @media(max-width:600px){ .cb{flex-direction:column;bottom:0;left:0;right:0;border-radius:20px 20px 0 0;padding:20px 20px calc(24px + env(safe-area-inset-bottom));} .cb-btns{width:100%;} .btn-c{flex:1;text-align:center;} }

        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo { 
            font-size: 32px; 
            font-weight: 800; 
            margin-bottom: 8px;
            text-decoration: none;
            color: var(--t);
            display: block;
        }
        .logo span { color: var(--p); }
        h1 { font-size: 20px; font-weight: 800; margin-bottom: 24px; color: var(--t); }
        .fg { text-align: left; margin-bottom: 16px; }
        .fg label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        .fg input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .fg input:focus { border-color: var(--p); box-shadow: 0 0 0 4px rgba(26,110,245,0.1); }
        .btn-p {
            width: 100%;
            background: var(--p);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-p:hover { background: var(--pd); transform: translateY(-1px); }
        .btn-p:disabled { opacity: 0.7; cursor: not-allowed; }
        .err { 
            background: #fee2e2; 
            color: #dc2626; 
            padding: 10px; 
            border-radius: 10px; 
            font-size: 13px; 
            margin-bottom: 16px;
            display: none;
        }
        .msg {
            background: #dcfce7;
            color: #15803d;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        footer{background:#fff;padding:60px 20px 40px;border-top:1px solid #eef2fb;margin-top:auto;width:100%;}
        .f-cnt{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;text-align:left;}
        .f-col h4{font-size:16px;font-weight:800;margin-bottom:20px;color:var(--t);}
        .f-col p{font-size:14px;color:var(--m);line-height:1.6;margin-bottom:20px;}
        .f-links{list-style:none;}
        .f-links li{margin-bottom:12px;}
        .f-links a{text-decoration:none;color:var(--m);font-size:14px;transition:color .2s;}
        .f-links a:hover{color:var(--p);}
        .f-btm{max-width:1100px;margin:40px auto 0;padding-top:30px;border-top:1px solid #eef2fb;text-align:center;}
        .f-btm p{font-size:13px;color:var(--m);}
        @media(max-width:800px){.f-cnt{grid-template-columns:1fr 1fr;}}
        @media(max-width:600px){.f-cnt{grid-template-columns:1fr;text-align:center;}}
    </style>
</head>
<body style="flex-direction: column;">
    <div class="cb" id="cookieBanner">
      <p>🍪 Utilizziamo i cookie per migliorare la tua esperienza e analizzare il traffico. Cliccando su "Accetta tutto", acconsenti al nostro utilizzo dei cookie.</p>
      <div class="cb-btns">
        <button class="btn-c sec" onclick="acceptCookies('essential')">Solo necessari</button>
        <button class="btn-c" onclick="acceptCookies('all')">Accetta tutto</button>
      </div>
    </div>
    <div class="login-card">
        <a href="index.html" class="logo"><img src="logo-formazione.png" alt="Logo" style="height:40px;"></a>
        <h1>Nuova Password</h1>
        <div id="errMsg" class="err"></div>
        <div id="successMsg" class="msg"></div>
        <form id="resetForm">
            <div class="fg">
                <label>Nuova Password</label>
                <input type="password" id="password" placeholder="Minimo 8 caratteri + numero + speciale" required>
            </div>
            <button type="submit" id="btnSubmit" class="btn-p">Salva Password</button>
        </form>
    </div>

    <script>
        var supabaseUrl = 'https://kpgqagunzbgtlsxgeoub.supabase.co';
        var supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZ3FhZ3VuemJndGxzeGdlb3ViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NjQ4ODAsImV4cCI6MjA4OTE0MDg4MH0.ee94NWJEz1xRxugiWOn1_ognhrEEDEm7_-_QxPQyB_g';
        var supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('resetForm');
        const btn = document.getElementById('btnSubmit');
        const errDiv = document.getElementById('errMsg');
        const succDiv = document.getElementById('successMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errDiv.style.display = 'none';
            succDiv.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '⏳ Salvataggio...';

            const password = document.getElementById('password').value;

            // Password Complexity Check
            const pwdRegex = /^(?=.*[0-9])(?=.*[!@#$%^&*])[a-zA-Z0-9!@#$%^&*]{8,}$/;
            if (!pwdRegex.test(password)) {
                errDiv.textContent = 'La password deve contenere almeno 8 caratteri, un numero e un segno speciale (!@#$%^&*)';
                errDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Salva Password';
                return;
            }

            try {
                const { error } = await supabase.auth.updateUser({ password });
                if (error) throw error;
                
                succDiv.textContent = 'Password aggiornata con successo! Verrai reindirizzato al login.';
                succDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (error) {
                errDiv.textContent = error.message;
                errDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Salva Password';
            }
        });
        function acceptCookies(t){ localStorage.setItem('cookieConsent',t); document.getElementById('cookieBanner').style.display='none'; }
        if(!localStorage.getItem('cookieConsent')) document.getElementById('cookieBanner').style.display='flex';
    </script>
</body>
</html>
