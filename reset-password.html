<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reimposta Password | BandiPMI</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --p: #1a6ef5;
            --pd: #0f4ec2;
            --g: #f4f6fa;
            --t: #1e1e2e;
            --m: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #eef2fb; 
            color: var(--t);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo { 
            font-size: 32px; 
            font-weight: 800; 
            margin-bottom: 8px;
            text-decoration: none;
            color: var(--t);
            display: block;
        }
        .logo span { color: var(--p); }
        h1 { font-size: 20px; font-weight: 800; margin-bottom: 24px; color: var(--t); }
        .fg { text-align: left; margin-bottom: 16px; }
        .fg label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        .fg input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .fg input:focus { border-color: var(--p); box-shadow: 0 0 0 4px rgba(26,110,245,0.1); }
        .btn-p {
            width: 100%;
            background: var(--p);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-p:hover { background: var(--pd); transform: translateY(-1px); }
        .btn-p:disabled { opacity: 0.7; cursor: not-allowed; }
        .err { 
            background: #fee2e2; 
            color: #dc2626; 
            padding: 10px; 
            border-radius: 10px; 
            font-size: 13px; 
            margin-bottom: 16px;
            display: none;
        }
        .msg {
            background: #dcfce7;
            color: #15803d;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <a href="index.html" class="logo">Bandi<span>PMI</span> 🚀</a>
        <h1>Nuova Password</h1>
        <div id="errMsg" class="err"></div>
        <div id="successMsg" class="msg"></div>
        <form id="resetForm">
            <div class="fg">
                <label>Nuova Password</label>
                <input type="password" id="password" placeholder="Minimo 8 caratteri + numero + speciale" required>
            </div>
            <button type="submit" id="btnSubmit" class="btn-p">Salva Password</button>
        </form>
    </div>

    <script>
        var supabaseUrl = 'https://kpgqagunzbgtlsxgeoub.supabase.co';
        var supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZ3FhZ3VuemJndGxzeGdlb3ViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NjQ4ODAsImV4cCI6MjA4OTE0MDg4MH0.ee94NWJEz1xRxugiWOn1_ognhrEEDEm7_-_QxPQyB_g';
        var supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('resetForm');
        const btn = document.getElementById('btnSubmit');
        const errDiv = document.getElementById('errMsg');
        const succDiv = document.getElementById('successMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errDiv.style.display = 'none';
            succDiv.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '⏳ Salvataggio...';

            const password = document.getElementById('password').value;

            // Password Complexity Check
            const pwdRegex = /^(?=.*[0-9])(?=.*[!@#$%^&*])[a-zA-Z0-9!@#$%^&*]{8,}$/;
            if (!pwdRegex.test(password)) {
                errDiv.textContent = 'La password deve contenere almeno 8 caratteri, un numero e un segno speciale (!@#$%^&*)';
                errDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Salva Password';
                return;
            }

            try {
                const { error } = await supabase.auth.updateUser({ password });
                if (error) throw error;
                
                succDiv.textContent = 'Password aggiornata con successo! Verrai reindirizzato al login.';
                succDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (error) {
                errDiv.textContent = error.message;
                errDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Salva Password';
            }
        });
    </script>
</body>
</html>
